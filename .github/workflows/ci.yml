name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel older runs on the same ref when a new commit lands (saves CI minutes).
# Safe interpolation: github.workflow is a fixed workflow name; github.ref is a
# validated git ref identifier (not user-controlled free-form input).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma client is generated, not committed — typecheck needs it.
      - run: pnpm prisma generate
      - run: pnpm typecheck

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prodect
          POSTGRES_PASSWORD: prodect
          POSTGRES_DB: prodect
        ports:
          - 5432:5432
        # Wait until pg_isready returns OK before the job's steps start.
        options: >-
          --health-cmd "pg_isready -U prodect -d prodect"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      # In CI we use the standard 5432 (no doooo-postgres collision here).
      DATABASE_URL: postgresql://prodect:prodect@localhost:5432/prodect
      # Better-Auth reads BETTER_AUTH_SECRET at module-evaluation time, and
      # `next build` imports the auth module while collecting page data —
      # so the var must be present even though no real auth happens during
      # build. This is a throwaway value used ONLY for the CI build; the
      # real per-environment secret lives in the Vercel dashboard and is
      # rotated independently. Safe to commit because it grants no access
      # to anything — it just lets the module load.
      BETTER_AUTH_SECRET: ci-build-only-not-a-real-secret-do-not-reuse
      # Subtask 1.1.4: Google OAuth provider requires both env vars at
      # module load (requiredEnv check). CI uses placeholders — they let
      # Better-Auth register the provider so `next build` succeeds; the
      # real per-environment values live in the Vercel dashboard. The
      # build never actually hits Google with these.
      GOOGLE_CLIENT_ID: ci-build-only-placeholder
      GOOGLE_CLIENT_SECRET: ci-build-only-placeholder
      # Story 2.3.7: Vercel Blob token. A placeholder is sufficient for build +
      # tests (the Blob SDK is mocked in unit tests; no CI path performs a real
      # upload). The real token lives in the Vercel dashboard (Subtask 2.3.9).
      BLOB_READ_WRITE_TOKEN: vercel_blob_rw_ci_build_only_placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma 7's `migrate deploy` does not auto-generate the client (unlike
      # `migrate dev`); next build's internal `tsc` then can't resolve
      # PrismaClient. Generate explicitly before build. The `migrate deploy`
      # step that used to live here was folded into the `build` script in
      # 8fc649d so every Vercel deploy self-migrates its target database
      # (production Neon for prod, the per-PR Neon branch for previews) —
      # `pnpm build` here invokes that same script and migrates this job's
      # ephemeral Postgres service container.
      - run: pnpm prisma generate
      - run: pnpm build

  test:
    name: Vitest (integration + coverage)
    runs-on: ubuntu-latest
    # Skip the integration suite on plan-seed and design PRs, same as E2E
    # below. A `seed/*` PR only edits scripts/plan-seed/** and a `design/*` PR
    # only edits design/** — neither touches app code, services, or
    # repositories, so the integration tests (which run against a real Postgres
    # to exercise that code) have nothing new to cover. lint/typecheck/build
    # still run. github.head_ref is the PR source branch (empty on
    # push-to-main, where the suite runs normally).
    if: ${{ !startsWith(github.head_ref, 'seed/') && !startsWith(github.head_ref, 'design/') }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prodect
          POSTGRES_PASSWORD: prodect
          POSTGRES_DB: prodect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prodect -d prodect"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      # In CI Postgres runs on the standard 5432.
      DATABASE_URL: postgresql://prodect:prodect@localhost:5432/prodect
      # The auth module reads these at import time (Better-Auth's requiredEnv
      # check); the Vitest suite imports it transitively. Throwaway CI values —
      # see the build job for the rationale. No real OAuth happens here.
      BETTER_AUTH_SECRET: ci-test-only-not-a-real-secret-do-not-reuse
      GOOGLE_CLIENT_ID: ci-test-placeholder
      GOOGLE_CLIENT_SECRET: ci-test-placeholder
      # Story 2.3.7 — placeholder; the Blob SDK is mocked in unit tests and no
      # E2E performs a real upload (the real token lives in Vercel, Subtask 2.3.9).
      BLOB_READ_WRITE_TOKEN: vercel_blob_rw_ci_test_only_placeholder
      # Skip the husky install postinstall — CI has no .git/hooks to wire.
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      # The integration tests run against a REAL Postgres (no mocks): they need
      # the schema, the structural-integrity triggers, the RLS policies, AND
      # the non-bypass `prodect_app` role — all created by the migrations.
      # `migrate deploy` applies every migration to the service container.
      - run: pnpm prisma migrate deploy
      # test:coverage enforces the ≥90% per-module thresholds for the four
      # work-item modules (vitest.config.ts). A regression below 90% fails CI.
      - run: pnpm test:coverage

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Skip E2E on plan-seed and design PRs. A `seed/*` PR only edits
    # scripts/plan-seed/** (the plan data the seed loads — see MOTIR.md "Plan
    # seed"); a `design/*` PR only edits design/** (mockups / .pen / PNG /
    # design-notes.md from a `type: design` subtask). Neither touches app code in
    # the Next bundle, so the Playwright suite has nothing new to exercise.
    # lint/typecheck/build/test still run. github.head_ref is the PR source branch
    # (empty on push-to-main, where E2E runs normally).
    if: ${{ !startsWith(github.head_ref, 'seed/') && !startsWith(github.head_ref, 'design/') }}
    # Wait for the build job — E2E is more expensive than a build failure
    # surfaces and there's no point burning Playwright minutes if `next
    # build` is red.
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prodect
          POSTGRES_PASSWORD: prodect
          POSTGRES_DB: prodect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prodect -d prodect"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      # In CI Postgres runs on the standard 5432.
      DATABASE_URL: postgresql://prodect:prodect@localhost:5432/prodect
      # See the build job for the rationale on these throwaway values.
      # Better-Auth's module-load requiredEnv check needs them present;
      # the actual OAuth round-trip is intercepted by the undici MockAgent
      # in instrumentation.ts (E2E_TEST_OAUTH=1 below).
      BETTER_AUTH_SECRET: ci-e2e-only-not-a-real-secret-do-not-reuse
      GOOGLE_CLIENT_ID: ci-e2e-placeholder
      GOOGLE_CLIENT_SECRET: ci-e2e-placeholder
      # Dev-only file email provider — emails appended as JSON lines to
      # EMAIL_OUTBOX_PATH so the credentials spec can capture the reset
      # link. The playwright.config.ts's webServer.env block ALSO sets
      # these on the dev server it spawns, but setting them at the job
      # level too keeps them visible to anyone reading the workflow file.
      EMAIL_PROVIDER: file
      EMAIL_OUTBOX_PATH: /tmp/motir-test-emails.jsonl
      E2E_TEST_OAUTH: '1'
      E2E_TEST_OAUTH_USER_PATH: /tmp/motir-test-oauth-user.json
      # Skip the husky install postinstall — CI has no .git/hooks to wire.
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      # The auth module reads BETTER_AUTH_SECRET, GOOGLE_CLIENT_ID, and
      # GOOGLE_CLIENT_SECRET at import time — the same reason `pnpm build`
      # needs them. `pnpm prisma migrate deploy` creates the auth tables
      # from prisma/migrations; without this the first sign-up POST hits
      # an empty database and errors with "relation \"user\" does not
      # exist". (The `build` job runs this transitively via the build
      # script; here we run it explicitly because we don't run build.)
      - run: pnpm prisma migrate deploy
      - run: pnpm exec playwright install --with-deps chromium
      # The at-scale journeys — board-at-scale (Story 3.5, Kanban) AND
      # board-scrum-at-scale (Story 4.7, Scrum) — need the 3.5.1 cap/Done-age
      # test seam configured, so they run in their own seam-set step below —
      # exclude both here ("board(-scrum)?-at-scale" matches the two grep tags).
      - run: pnpm test:e2e --grep-invert "board(-scrum)?-at-scale"
      # Stories 3.5 + 4.7 — the cross-cutting board journeys AT SCALE (Kanban +
      # Scrum). The specs self-seed their fixtures (3.5.1 board-shaped · 4.7.1
      # sprint-shaped); these overrides (the 3.5.1 seam, forwarded to the dev
      # server by playwright.config.ts) lower the issue cap + Done-age window so
      # the over-cap banner + Done-age trim are reachable with tens of rows
      # instead of 5,000. Covers 3.5.2/3.5.3 (`board-at-scale`) and 4.7.2 — plus
      # 4.7.3 once it lands (`board-scrum-at-scale`); workers=1, so the specs'
      # DB resets never race.
      - name: E2E — board at scale (Stories 3.5 + 4.7)
        run: pnpm test:e2e --grep "board(-scrum)?-at-scale"
        env:
          BOARD_ISSUE_CAP_OVERRIDE: '40'
          DONE_AGE_WINDOW_DAYS_OVERRIDE: '7'
      # Always upload the report — pass-runs are useful for debugging
      # flakes, and the report is small. The trace/video/screenshot
      # artifacts only exist for failures (config above), so a passing
      # run uploads only the html summary.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: out/playwright-report
          retention-days: 7
