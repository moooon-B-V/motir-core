name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel older runs on the same ref when a new commit lands (saves CI minutes).
# Safe interpolation: github.workflow is a fixed workflow name; github.ref is a
# validated git ref identifier (not user-controlled free-form input).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma client is generated, not committed — typecheck needs it.
      - run: pnpm prisma generate
      - run: pnpm typecheck

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prodect
          POSTGRES_PASSWORD: prodect
          POSTGRES_DB: prodect
        ports:
          - 5432:5432
        # Wait until pg_isready returns OK before the job's steps start.
        options: >-
          --health-cmd "pg_isready -U prodect -d prodect"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      # In CI we use the standard 5432 (no doooo-postgres collision here).
      DATABASE_URL: postgresql://prodect:prodect@localhost:5432/prodect
      # Better-Auth reads BETTER_AUTH_SECRET at module-evaluation time, and
      # `next build` imports the auth module while collecting page data —
      # so the var must be present even though no real auth happens during
      # build. This is a throwaway value used ONLY for the CI build; the
      # real per-environment secret lives in the Vercel dashboard and is
      # rotated independently. Safe to commit because it grants no access
      # to anything — it just lets the module load.
      BETTER_AUTH_SECRET: ci-build-only-not-a-real-secret-do-not-reuse
      # Subtask 1.1.4: Google OAuth provider requires both env vars at
      # module load (requiredEnv check). CI uses placeholders — they let
      # Better-Auth register the provider so `next build` succeeds; the
      # real per-environment values live in the Vercel dashboard. The
      # build never actually hits Google with these.
      GOOGLE_CLIENT_ID: ci-build-only-placeholder
      GOOGLE_CLIENT_SECRET: ci-build-only-placeholder
      # Story 2.3.7: Vercel Blob token. A placeholder is sufficient for build +
      # tests (the Blob SDK is mocked in unit tests; no CI path performs a real
      # upload). The real token lives in the Vercel dashboard (Subtask 2.3.9).
      BLOB_READ_WRITE_TOKEN: vercel_blob_rw_ci_build_only_placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma 7's `migrate deploy` does not auto-generate the client (unlike
      # `migrate dev`); next build's internal `tsc` then can't resolve
      # PrismaClient. Generate explicitly before build. The `migrate deploy`
      # step that used to live here was folded into the `build` script in
      # 8fc649d so every Vercel deploy self-migrates its target database
      # (production Neon for prod, the per-PR Neon branch for previews) —
      # `pnpm build` here invokes that same script and migrates this job's
      # ephemeral Postgres service container.
      - run: pnpm prisma generate
      - run: pnpm build

  test:
    name: Vitest (integration + coverage)
    runs-on: ubuntu-latest
    # Skip the integration suite on plan-seed and design PRs, same as E2E
    # below. A `seed/*` PR only edits scripts/plan-seed/** and a `design/*` PR
    # only edits design/** — neither touches app code, services, or
    # repositories, so the integration tests (which run against a real Postgres
    # to exercise that code) have nothing new to cover. lint/typecheck/build
    # still run. github.head_ref is the PR source branch (empty on
    # push-to-main, where the suite runs normally).
    if: ${{ !startsWith(github.head_ref, 'seed/') && !startsWith(github.head_ref, 'design/') }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prodect
          POSTGRES_PASSWORD: prodect
          POSTGRES_DB: prodect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prodect -d prodect"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      # In CI Postgres runs on the standard 5432.
      DATABASE_URL: postgresql://prodect:prodect@localhost:5432/prodect
      # The auth module reads these at import time (Better-Auth's requiredEnv
      # check); the Vitest suite imports it transitively. Throwaway CI values —
      # see the build job for the rationale. No real OAuth happens here.
      BETTER_AUTH_SECRET: ci-test-only-not-a-real-secret-do-not-reuse
      GOOGLE_CLIENT_ID: ci-test-placeholder
      GOOGLE_CLIENT_SECRET: ci-test-placeholder
      # Story 2.3.7 — placeholder; the Blob SDK is mocked in unit tests and no
      # E2E performs a real upload (the real token lives in Vercel, Subtask 2.3.9).
      BLOB_READ_WRITE_TOKEN: vercel_blob_rw_ci_test_only_placeholder
      # Skip the husky install postinstall — CI has no .git/hooks to wire.
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      # The integration tests run against a REAL Postgres (no mocks): they need
      # the schema, the structural-integrity triggers, the RLS policies, AND
      # the non-bypass `prodect_app` role — all created by the migrations.
      # `migrate deploy` applies every migration to the service container.
      - run: pnpm prisma migrate deploy
      # test:coverage enforces the ≥90% per-module thresholds for the four
      # work-item modules (vitest.config.ts). A regression below 90% fails CI.
      - run: pnpm test:coverage

  e2e:
    # Sharded matrix (Subtask: E2E CI speedup). The suite is `workers: 1` /
    # `fullyParallel: false` ON PURPOSE — every spec shares one Postgres and a
    # global truncate, so parallel workers IN ONE PROCESS would race. We can't
    # parallelize inside a job, so we parallelize ACROSS jobs: each matrix leg is
    # its own runner with its OWN ephemeral `postgres:16-alpine` service
    # container, so there is zero cross-leg DB contention (the local shared-:5433
    # flake does not exist between CI jobs). Wall-clock goes from sum(all specs)
    # to max(slowest leg).
    #   • 5 "bulk" legs — the non-at-scale, non-a11y suite split by Playwright's
    #     native `--shard=i/5` (it filters by --grep* first, then shards the
    #     result). Bumped 4→5 to shrink the slowest bulk leg; pulling the @a11y
    #     sweeps out into their own leg (below) already removed the worst long
    #     pole, so 5 is the balance — each leg re-pays the install + dual-webServer
    #     boot, and more legs past this give diminishing returns for the cost.
    #   • 1 "a11y" leg — every `@a11y` axe sweep, pulled into its own leg via
    #     `--grep "@a11y"` (and `--grep-invert`-ed OUT of the bulk legs). WHY a
    #     dedicated leg and not just more bulk shards: Playwright's count-based
    #     sharding keeps whole files together in DISCOVERY ORDER and slices
    #     contiguously, so the (alphabetically adjacent) shell-a11y* files always
    #     cluster into ONE bulk shard no matter the shard count — that shard was
    #     the bulk-3 long-pole (16 slow axe sweeps in one leg). Selecting by the
    #     @a11y TAG instead spreads nothing back into the bulks and lets the axe
    #     suite run as its own parallel leg. The shell-a11y file is also split
    #     three ways (shell-a11y / -tokens / -detail) so this leg can itself be
    #     sharded later if it becomes the long pole.
    #   • 2 "at-scale" legs — board(-scrum)-at-scale and collab-at-scale, which
    #     need distinct env overrides (issue-cap / seed knobs) and so can't share
    #     a shard. They run IN PARALLEL with the bulk legs.
    # The at-scale override env is supplied per-leg from the matrix; bulk legs
    # leave those vars empty (''), which playwright.config.ts treats as unset
    # (BOARD_LOAD_SEAM_ENV skips empty values) so the shipped 5,000/14 board
    # constants and default collab seed apply — a bulk leg must NOT inherit an
    # at-scale cap or it would skew the ordinary board specs.
    name: Playwright E2E (${{ matrix.id }})
    runs-on: ubuntu-latest
    # Skip E2E on plan-seed and design PRs. A `seed/*` PR only edits
    # scripts/plan-seed/** (the plan data the seed loads — see MOTIR.md "Plan
    # seed"); a `design/*` PR only edits design/** (mockups / .pen / PNG /
    # design-notes.md from a `type: design` subtask). Neither touches app code in
    # the Next bundle, so the Playwright suite has nothing new to exercise.
    # lint/typecheck/build/test still run. github.head_ref is the PR source branch
    # (empty on push-to-main, where E2E runs normally).
    if: ${{ !startsWith(github.head_ref, 'seed/') && !startsWith(github.head_ref, 'design/') }}
    # Wait for the build job — E2E is more expensive than a build failure
    # surfaces and there's no point burning Playwright minutes if `next
    # build` is red.
    needs: build
    strategy:
      # One leg failing must NOT cancel the others — we want the full E2E
      # picture (and all Playwright reports) from a single run, not a race to
      # the first red shard.
      fail-fast: false
      matrix:
        include:
          # The non-at-scale, non-a11y suite, split five ways. `--grep-invert`
          # excludes the three at-scale tags AND the @a11y sweeps (their own leg
          # below); `--shard=i/5` then partitions what remains.
          - id: bulk-1
            args: '--grep-invert "(board(-scrum)?|collab)-at-scale|@a11y" --shard=1/5'
          - id: bulk-2
            args: '--grep-invert "(board(-scrum)?|collab)-at-scale|@a11y" --shard=2/5'
          - id: bulk-3
            args: '--grep-invert "(board(-scrum)?|collab)-at-scale|@a11y" --shard=3/5'
          - id: bulk-4
            args: '--grep-invert "(board(-scrum)?|collab)-at-scale|@a11y" --shard=4/5'
          - id: bulk-5
            args: '--grep-invert "(board(-scrum)?|collab)-at-scale|@a11y" --shard=5/5'
          # Every @a11y axe sweep (the shell-a11y* files + the per-feature a11y
          # closers), pulled into one parallel leg so the slow sweeps stop
          # clustering into a single bulk shard. Standard board/collab defaults
          # apply (no override env). Split the shell-a11y file further or shard
          # this leg (`--grep "@a11y" --shard=i/2`) if it becomes the long pole.
          - id: a11y
            args: '--grep "@a11y"'
          # Stories 3.5 + 4.7 — board journeys AT SCALE (Kanban + Scrum). The
          # specs self-seed; these overrides lower the issue cap + Done-age
          # window so the over-cap banner + Done-age trim are reachable with tens
          # of rows instead of 5,000.
          - id: board-at-scale
            args: '--grep "board(-scrum)?-at-scale"'
            board_issue_cap: '40'
            done_age_window_days: '7'
          # Story 5.6 — the collaboration-LOADED issue AT SCALE. These knobs keep
          # the lane fast while every large collection still EXCEEDS its page size
          # (comments 40>20, attachments 64>50, revisions 60+>20) so paging
          # actually engages — the spec's beforeAll fails loud otherwise.
          - id: collab-at-scale
            args: '--grep "collab-at-scale"'
            collab_comments: '40'
            collab_churn_edits: '60'
            collab_spread_issues: '2'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prodect
          POSTGRES_PASSWORD: prodect
          POSTGRES_DB: prodect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prodect -d prodect"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      # In CI Postgres runs on the standard 5432.
      DATABASE_URL: postgresql://prodect:prodect@localhost:5432/prodect
      # See the build job for the rationale on these throwaway values.
      # Better-Auth's module-load requiredEnv check needs them present;
      # the actual OAuth round-trip is intercepted by the undici MockAgent
      # in instrumentation.ts (E2E_TEST_OAUTH=1 below).
      BETTER_AUTH_SECRET: ci-e2e-only-not-a-real-secret-do-not-reuse
      GOOGLE_CLIENT_ID: ci-e2e-placeholder
      GOOGLE_CLIENT_SECRET: ci-e2e-placeholder
      # Dev-only file email provider — emails appended as JSON lines to
      # EMAIL_OUTBOX_PATH so the credentials spec can capture the reset
      # link. The playwright.config.ts's webServer.env block ALSO sets
      # these on the dev server it spawns, but setting them at the job
      # level too keeps them visible to anyone reading the workflow file.
      EMAIL_PROVIDER: file
      EMAIL_OUTBOX_PATH: /tmp/motir-test-emails.jsonl
      E2E_TEST_OAUTH: '1'
      E2E_TEST_OAUTH_USER_PATH: /tmp/motir-test-oauth-user.json
      # Skip the husky install postinstall — CI has no .git/hooks to wire.
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      # The auth module reads BETTER_AUTH_SECRET, GOOGLE_CLIENT_ID, and
      # GOOGLE_CLIENT_SECRET at import time — the same reason `pnpm build`
      # needs them. `pnpm prisma migrate deploy` creates the auth tables
      # from prisma/migrations; without this the first sign-up POST hits
      # an empty database and errors with "relation \"user\" does not
      # exist". (The `build` job runs this transitively via the build
      # script; here we run it explicitly because we don't run build.)
      - run: pnpm prisma migrate deploy
      # Cache the Playwright browser binary across runs (and the matrix legs).
      # Every leg re-pays `playwright install` otherwise — pure fixed overhead
      # that sharding multiplies by the leg count. Keyed on the lockfile so a
      # @playwright/test bump invalidates it; the OS apt deps aren't cacheable,
      # so we still run install-deps on a hit (fast) and the full --with-deps
      # download only on a miss.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      # NOTE: the Inngest dev-server binary (E2E's second webServer) is now a
      # pinned `inngest-cli` devDependency — `pnpm install` above runs its
      # postinstall (allowlisted in pnpm-workspace.yaml `allowBuilds`) to fetch
      # the binary, so it's present before any spec runs. This replaced the old
      # npx-cache + pre-warm steps, which existed only to keep the 95MB cold
      # download out of Playwright's 120s webServer window (the timeout flake).
      # ONE run step per matrix leg. `matrix.args` selects the slice (a
      # --grep-invert+--shard bulk slice, or a --grep at-scale lane); the
      # override env is per-leg and empty ('') on bulk legs — playwright.config
      # treats empty as unset, so bulk legs keep the shipped board/collab
      # defaults. workers=1, so this leg's own DB resets never race.
      - name: Run E2E (${{ matrix.id }})
        run: pnpm test:e2e ${{ matrix.args }}
        env:
          BOARD_ISSUE_CAP_OVERRIDE: ${{ matrix.board_issue_cap }}
          DONE_AGE_WINDOW_DAYS_OVERRIDE: ${{ matrix.done_age_window_days }}
          SEED_COLLAB_COMMENTS: ${{ matrix.collab_comments }}
          SEED_COLLAB_CHURN_EDITS: ${{ matrix.collab_churn_edits }}
          SEED_COLLAB_SPREAD_ISSUES: ${{ matrix.collab_spread_issues }}
      # Always upload the report — pass-runs are useful for debugging flakes, and
      # the report is small. The trace/video/screenshot artifacts only exist for
      # failures (config above). The artifact name MUST be unique per leg or the
      # matrix legs collide on upload (upload-artifact@v4+ errors on a dup name).
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.id }}
          path: out/playwright-report
          retention-days: 7
