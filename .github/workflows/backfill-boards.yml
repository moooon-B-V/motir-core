name: Backfill default boards

# Manual operator action (Subtask 3.1.2): seed the default Kanban board onto
# every project that predates Story 3.1 (a project with a workflow but no
# board). Runs `pnpm db:backfill:boards`, which sweeps only board-LESS projects
# and persists each board through the shipped application path
# (boardsService.seedDefaultBoard under the workspace GUC) — the same code
# createProject uses. NOT a raw-SQL migration (3.1.1 forbids seeding board rows
# in SQL): the seed must go through the RLS-safe repository layer.
#
# IDEMPOTENT + SAFE TO RE-RUN: the sweep skips projects that already have a
# board, so re-running is a no-op. There is no auto-on-merge trigger — a data
# backfill is an explicit operator decision, so this is `workflow_dispatch`
# (the "Run workflow" button) ONLY, mirroring the manual half of seed.yml.
#
# Inert until the SEED_DATABASE_URL secret is set: the guard step detects the
# missing secret and SKIPS (the job stays green with a notice), so an
# unconfigured repo doesn't fail. Add the secret to enable.
on:
  workflow_dispatch:

# Never run two backfills at once. Each is idempotent, but a parallel run could
# race the existence check (both see a project board-less → two boards). One at
# a time; don't cancel an in-flight run.
concurrency:
  group: backfill-boards
  cancel-in-progress: false

jobs:
  backfill:
    name: Backfill default boards onto board-less projects
    runs-on: ubuntu-latest
    env:
      # The production (unpooled) Neon connection string — the SAME secret the
      # reseed workflow uses. Empty when unset; the guard step skips then.
      DATABASE_URL: ${{ secrets.SEED_DATABASE_URL }}
      # Defensive parity with seed.yml: the backfill does NOT currently import
      # the Better-Auth instance (lib/auth/index.ts), so these aren't strictly
      # required today — but wiring them costs nothing and keeps the job working
      # if a transitive import ever pulls it in (its requiredEnv check needs all
      # three at module load). The GOOGLE_* values only register the OAuth
      # provider; no round-trip happens.
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      GOOGLE_CLIENT_ID: backfill-placeholder
      GOOGLE_CLIENT_SECRET: backfill-placeholder
      # No git hooks to wire in CI.
      HUSKY: '0'
    steps:
      # Gate the whole job on the secret being present. `secrets.*` can't be used
      # in a job/step `if:`, but a step CAN read it into an env var and branch —
      # so an unconfigured repo skips (green) instead of failing at migrate/seed.
      - name: Check SEED_DATABASE_URL is configured
        id: guard
        env:
          SEED_DATABASE_URL: ${{ secrets.SEED_DATABASE_URL }}
        run: |
          if [ -z "$SEED_DATABASE_URL" ]; then
            echo "::notice::SEED_DATABASE_URL is not set — skipping the board backfill. Add it under Settings → Secrets and variables → Actions to enable it."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v6
      - if: steps.guard.outputs.enabled == 'true'
        uses: pnpm/action-setup@v6
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - if: steps.guard.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.guard.outputs.enabled == 'true'
        run: pnpm prisma generate
      # Make sure the target DB has the board tables (3.1.1) before backfilling.
      - if: steps.guard.outputs.enabled == 'true'
        run: pnpm prisma migrate deploy
      - if: steps.guard.outputs.enabled == 'true'
        run: pnpm db:backfill:boards
