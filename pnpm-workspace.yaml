# Workspace packages. The Next app lives at the repo root; `packages/*` holds
# the workspace packages — the first is `@motir/cli` (Subtask 7.9.1), the
# terminal MCP client. The root app build is unaffected by their presence.
packages:
  - 'packages/*'

allowBuilds:
  # @parcel/watcher + @swc/core arrive as OPTIONAL deps of next-intl (its
  # experimental build-time SWC message plugin + file watcher). The cookie-based
  # setup never uses that tooling — `next build` runs fine with these native
  # builds skipped — so set false to silence pnpm 11's ERR_PNPM_IGNORED_BUILDS
  # gate deterministically (same rationale as protobufjs below). Without this,
  # `pnpm install` exits 1 on CI/Vercel.
  '@parcel/watcher': false
  '@swc/core': false
  '@prisma/engines': true
  argon2: true
  esbuild: true
  prisma: true
  # protobufjs ships a postinstall that compiles native protobuf descriptors,
  # used only by Inngest's gRPC `connect` transport. We serve over HTTP (the
  # app/api/inngest serve route) and never use connect, so the build is
  # unneeded — set false to silence pnpm 11's ERR_PNPM_IGNORED_BUILDS gate
  # deterministically (PRODECT_FINDINGS #30, sharp edge #3).
  protobufjs: false
  sharp: true
  unrs-resolver: true
  # inngest-cli's postinstall downloads the Inngest dev-server Go binary. The
  # E2E suite spawns it as its second webServer (the executor that runs the
  # email.send job), so the binary MUST be present after `pnpm install` — set
  # true. This replaces the old `npx --yes inngest-cli@<v>` approach (which
  # re-resolved @latest every run, couldn't be cached, and cold-downloaded the
  # 95MB binary INSIDE Playwright's 120s webServer window → the documented
  # timeout flake). As a pinned devDependency the binary is fetched once at
  # install time (outside any timeout) and cached via the pnpm store.
  inngest-cli: true
